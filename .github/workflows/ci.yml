name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: insider_one
          POSTGRES_USER: insider
          POSTGRES_PASSWORD: insider
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insider -d insider_one"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://insider:insider@localhost:5432/insider_one?sslmode=disable
          OTEL_ENABLED: "false"
        run: go test ./... -count=1
