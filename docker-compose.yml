services:
  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://insider:insider@postgres:5432/insider_one?sslmode=disable
      PROVIDER_URL: https://webhook.site/replace-with-your-uuid
      SMS_PROVIDER_URL: ""
      EMAIL_PROVIDER_URL: ""
      PUSH_PROVIDER_URL: ""
      LISTEN_ADDR: :8080
      LOG_LEVEL: info
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: insider-one-notifications
      API_KEYS: ""
      RATE_LIMIT_PER_SECOND: "100"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: insider_one
      POSTGRES_USER: insider
      POSTGRES_PASSWORD: insider
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insider -d insider_one"]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "9464:9464"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

volumes:
  postgres-data:
